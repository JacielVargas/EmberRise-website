<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="EmberRise is coming. It started with a dream, fueled by belief."
    >

    <title>EmberRise | Coming Soon</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <main class="page">
        <div class="background-glow" aria-hidden="true"></div>

        <div class="embers" aria-hidden="true">
            <span class="ember"></span>
            <span class="ember"></span>
            <span class="ember"></span>
            <span class="ember"></span>
            <span class="ember"></span>
            <span class="ember"></span>

        <section class="content">
            <div class="logo-wrap">
                <img
                    class="logo"
                    src="logo.png"
                    alt="EmberRise flame and ember logo"
                >
            </div>

            <h1 class="brand">
                <span class="brand-main">EMBER</span>

                <span class="brand-rise-row">
                    <span class="brand-rise">RISE</span>
                </span>
            </h1>

            <p class="story">
                It started with a <strong>dream</strong>,
