<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EmberRise</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Georgia,serif;
    overflow:hidden;
}

.hero{

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

}

img{

    width:260px;

    filter:
        drop-shadow(0 0 8px #ff6600)
        drop-shadow(0 0 25px #ff5500)
        drop-shadow(0 0 60px #ff3300);

    animation:pulse 3s infinite ease-in-out;

}

h1{

    margin-top:40px;

    font-size:70px;

    letter-spacing:10px;

}

p{

    margin-top:18px;

    font-size:24px;

    color:#bbbbbb;

    font-style:italic;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div class="hero">

<img src="logo.png">

<h1>EMBERRISE</h1>

<p>It started with a dream... fueled by belief.</p>

</div>

</body>

</html>
