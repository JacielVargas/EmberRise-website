<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="EmberRise is coming. It started with a dream, fueled by belief."
    >

    <title>EmberRise | Coming Soon</title>

    <style>
        :root {
            --background: #000000;
            --ember: #ff5a00;
            --ember-light: #ff8a2a;
            --text: #f7f3ee;
            --muted: #a79d94;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            background: var(--background);
        }

        body {
            color: var(--text);
            font-family: Georgia, "Times New Roman", serif;
            overflow: hidden;
        }

        .page {
            position: relative;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            isolation: isolate;
        }

        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 520px;
            height: 520px;
            transform: translate(-50%, -58%);
            border-radius: 50%;
            background:
                radial-gradient(
                    circle,
                    rgba(255, 90, 0, 0.18) 0%,
                    rgba(255, 70, 0, 0.08) 35%,
                    transparent 70%
                );
            filter: blur(18px);
            animation: glowPulse 4s ease-in-out infinite;
            z-index: -2;
        }

        .content {
            width: min(92vw, 760px);
            text-align: center;
            animation: fadeIn 1.8s ease-out both;
        }

        .logo-wrap {
            position: relative;
            width: clamp(190px, 30vw, 330px);
            margin: 0 auto 34px;
        }

        .logo-wrap::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 3%;
            width: 60%;
            height: 14%;
            transform: translateX(-50%);
            border-radius: 50%;
            background: rgba(255, 82, 0, 0.38);
            filter: blur(22px);
            animation: emberBase 3.2s ease-in-out infinite;
            z-index: -1;
        }

        .logo {
            display: block;
            width: 100%;
            height: auto;
            filter:
                drop-shadow(0 0 7px rgba(255, 151, 57, 0.8))
                drop-shadow(0 0 20px rgba(255, 83, 0, 0.72))
                drop-shadow(0 0 50px rgba(255, 45, 0, 0.42));
            animation: breathe 3.2s ease-in-out infinite;
        }

        h1 {
            font-size: clamp(2.4rem, 7vw, 5rem);
            font-weight: 400;
            letter-spacing: clamp(0.25rem, 1.3vw, 0.85rem);
            line-height: 1;
            text-shadow:
                0 0 10px rgba(255, 86, 0, 0.18),
                0 0 30px rgba(255, 86, 0, 0.12);
        }

        .story {
            margin-top: 24px;
            font-size: clamp(1.05rem, 2.2vw, 1.5rem);
            line-height: 1.7;
            color: var(--muted);
            font-style: italic;
        }

        .story strong {
            color: var(--ember-light);
            font-weight: 400;
        }

        .coming-soon {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            margin-top: 32px;
            color: var(--ember-light);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.38rem;
            text-transform: uppercase;
        }

        .coming-soon::before,
        .coming-soon::after {
            content: "";
            width: 48px;
            height: 1px;
            background:
                linear-gradient(
                    90deg,
                    transparent,
                    var(--ember)
                );
            box-shadow: 0 0 8px rgba(255, 90, 0, 0.6);
        }

        .coming-soon::after {
            background:
                linear-gradient(
                    90deg,
                    var(--ember),
                    transparent
                );
        }

        .ember {
            position: absolute;
            bottom: -12px;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--ember-light);
            box-shadow:
                0 0 6px var(--ember),
                0 0 12px rgba(255, 65, 0, 0.8);
            opacity: 0;
            animation: rise linear infinite;
            z-index: -1;
        }

        .ember:nth-child(1) {
            left: 18%;
            animation-duration: 7s;
            animation-delay: 0s;
        }

        .ember:nth-child(2) {
            left: 29%;
            width: 2px;
            height: 2px;
            animation-duration: 9s;
            animation-delay: 2s;
        }

        .ember:nth-child(3) {
            left: 42%;
            animation-duration: 8s;
            animation-delay: 4s;
        }

        .ember:nth-child(4) {
            left: 57%;
            width: 4px;
            height: 4px;
            animation-duration: 10s;
            animation-delay: 1s;
        }

        .ember:nth-child(5) {
            left: 70%;
            width: 2px;
            height: 2px;
            animation-duration: 7.5s;
            animation-delay: 5s;
        }

        .ember:nth-child(6) {
            left: 82%;
            animation-duration: 9.5s;
            animation-delay: 3s;
        }

        @keyframes breathe {
            0%,
            100% {
                transform: scale(1);
                filter:
                    drop-shadow(0 0 7px rgba(255, 151, 57, 0.75))
                    drop-shadow(0 0 20px rgba(255, 83, 0, 0.65))
                    drop-shadow(0 0 45px rgba(255, 45, 0, 0.34));
            }

            50% {
                transform: scale(1.025);
                filter:
                    drop-shadow(0 0 10px rgba(255, 176, 82, 0.95))
                    drop-shadow(0 0 28px rgba(255, 83, 0, 0.9))
                    drop-shadow(0 0 70px rgba(255, 45, 0, 0.52));
            }
        }

        @keyframes glowPulse {
            0%,
            100% {
                opacity: 0.72;
                transform: translate(-50%, -58%) scale(0.96);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -58%) scale(1.05);
            }
        }

        @keyframes emberBase {
            0%,
            100% {
                opacity: 0.55;
                transform: translateX(-50%) scaleX(0.9);
            }

            50% {
                opacity: 0.95;
                transform: translateX(-50%) scaleX(1.08);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rise {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0) scale(0.7);
            }

            12% {
                opacity: 0.9;
            }

            70% {
                opacity: 0.45;
            }

            100% {
                opacity: 0;
                transform: translateY(-105vh) translateX(38px) scale(1.15);
            }
        }

        @media (max-width: 600px) {
            .page {
                padding: 24px 18px;
            }

            .logo-wrap {
                margin-bottom: 28px;
            }

            h1 {
                letter-spacing: 0.28rem;
            }

            .story {
                max-width: 340px;
                margin-right: auto;
                margin-left: auto;
            }

            .coming-soon {
                gap: 10px;
                letter-spacing: 0.25rem;
            }

            .coming-soon::before,
            .coming-soon::after {
                width: 28px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <div class="background-glow"></div>

        <span class="ember"></span>
        <span class="ember"></span>
        <span class="ember"></span>
        <span class="ember"></span>
        <span class="ember"></span>
        <span class="ember"></span>

        <section class="content">
            <div class="logo-wrap">
                <img
                    class="logo"
                    src="logo.png"
                    alt="EmberRise flame and ember logo"
                >
            </div>

            <h1>EMBERRISE</h1>

            <p class="story">
                It started with a <strong>dream</strong>,
                fueled by <strong>belief</strong>.
            </p>

            <div class="coming-soon">
                Coming Soon
            </div>
        </section>
    </main>
</body>
</html>
